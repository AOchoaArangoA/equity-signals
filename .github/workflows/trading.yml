name: equity-signals watchlist

on:
  schedule:
    - cron: '0 12 * * 1'       # Monday 8:00 am ET — weekly value scan
    - cron: '45 13 * * 1-5'    # 9:45 am ET  — exit check
    - cron: '0 15 * * 1-5'     # 11:00 am ET — exit check
    - cron: '30 16 * * 1-5'    # 12:30 pm ET — exit check
    - cron: '0 18 * * 1-5'     # 2:00 pm ET  — exit check
    - cron: '30 19 * * 1-5'    # 3:30 pm ET  — exit check pre-close
  workflow_dispatch:
    inputs:
      mode:
        description: 'weekly_value | exit | signals | entry'
        required: true
        default: 'signals'

env:
  ALPACA_API_KEY:       ${{ secrets.ALPACA_API_KEY }}
  ALPACA_SECRET_KEY:    ${{ secrets.ALPACA_SECRET_KEY }}
  ALPACA_BASE_URL:      ${{ secrets.ALPACA_BASE_URL }}
  TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
  PYTHONUNBUFFERED: "1"

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install yfinance alpaca-py python-dotenv pydantic-settings

      - name: Verify installation
        run: |
          python -c "import equity_signals; print('Package OK')"
          python -c "from equity_signals.execution.alpaca_trader import AlpacaTrader; print('AlpacaTrader OK')"

      - name: Weekly value scan
        if: github.event.schedule == '0 12 * * 1'
        run: python scripts/run_weekly_value.py

      - name: Exit check
        if: >
          github.event.schedule == '45 13 * * 1-5' ||
          github.event.schedule == '0 15 * * 1-5'  ||
          github.event.schedule == '30 16 * * 1-5' ||
          github.event.schedule == '0 18 * * 1-5'  ||
          github.event.schedule == '30 19 * * 1-5'
        run: python scripts/run_exit.py

      - name: Weekly value scan
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'weekly_value'
        run: python scripts/run_weekly_value.py --dry-run

      - name: Compute signals
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'signals'
        run: python scripts/run_signals.py

      - name: Entry scan
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'entry'
        run: |
          python scripts/run_signals.py
          python scripts/run_entry.py

      - name: Exit check
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'exit'
        run: python scripts/run_exit.py
