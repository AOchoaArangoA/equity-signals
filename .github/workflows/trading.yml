name: equity-signals watchlist

on:
  schedule:
    - cron: '0 12 * * 1'
    - cron: '45 13 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '30 19 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'entry | exit | signals'
        required: true
        default: 'signals'

env:
  ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
  ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
  ALPACA_BASE_URL:   ${{ secrets.ALPACA_BASE_URL }}
  PYTHONUNBUFFERED: "1"

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install yfinance alpaca-py python-dotenv pydantic-settings

      - name: Verify installation
        run: |
          python -c "import equity_signals; print('Package OK')"
          python -c "from equity_signals.execution.alpaca_trader import AlpacaTrader; print('AlpacaTrader OK')"

      - name: Entry scan (lunes 8am)
        if: github.event.schedule == '0 12 * * 1'
        run: python scripts/run_from_watchlist.py entry

      - name: Exit check
        if: >
          github.event.schedule == '45 13 * * 1-5' ||
          github.event.schedule == '0 15 * * 1-5'  ||
          github.event.schedule == '30 16 * * 1-5' ||
          github.event.schedule == '0 18 * * 1-5'  ||
          github.event.schedule == '30 19 * * 1-5'
        run: python scripts/run_from_watchlist.py exit

      - name: Manual run
        if: github.event_name == 'workflow_dispatch'
        run: python scripts/run_from_watchlist.py ${{ github.event.inputs.mode }}
